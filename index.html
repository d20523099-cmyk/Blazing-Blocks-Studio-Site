<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Blazing Blocks Studio</title>
    <style>
        :root {
            --bg: #0a0a0a;
            --accent: #ff6a00;
            --accent-bright: #ff8c38;
            --text-bright: #ffffff;
            --glass: rgba(20, 20, 20, 0.8);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            scroll-behavior: smooth;
        }

        body {
            background: var(--bg);
            color: var(--text-bright);
            font-family: 'Inter', 'Segoe UI', system-ui, sans-serif;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 30px;
            background: linear-gradient(135deg, #0a0a0a 0%, #1a1008 100%);
            background-attachment: fixed;
            flex-direction: column;
        }

        .container {
            width: 100%;
            max-width: 500px;
            position: relative;
            z-index: 1;
            transition: opacity 0.5s ease, transform 0.5s ease;
        }

        /* когда оверлей открыт — контейнер слегка затемняется и уходит вниз */
        .container.blurred .links,
        .container.blurred .footer {
            opacity: 0;
            transform: translateY(20px);
            pointer-events: none;
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .container .links,
        .container .footer {
            transition: opacity 0.4s ease, transform 0.4s ease;
        }

        .logo {
            font-size: 4rem;
            font-weight: 900;
            letter-spacing: 6px;
            margin-bottom: 20px;
            line-height: 1.2;
            text-transform: uppercase;
            background: linear-gradient(180deg, #ffffff 0%, #ffaa00 40%, #ff6a00 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            filter: drop-shadow(0 0 8px rgba(255, 106, 0, 0.7));
            animation: softGlow 2s ease-in-out infinite alternate;
        }

        @keyframes softGlow {
            0% {
                filter: drop-shadow(0 0 5px rgba(255, 106, 0, 0.5));
            }
            100% {
                filter: drop-shadow(0 0 12px rgba(255, 106, 0, 0.8));
            }
        }

        .subtitle {
            font-size: 1.2rem;
            color: #8a8a8a;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .links {
            display: flex;
            flex-direction: column;
            gap: 20px;
            max-width: 400px;
            margin: 0 auto;
            width: 100%;
        }

        .btn {
            background: var(--glass);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 106, 0, 0.3);
            color: var(--text-bright);
            padding: 16px 30px;
            border-radius: 12px;
            font-size: 1.3rem;
            font-weight: 600;
            letter-spacing: 1px;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            box-shadow: 0 0 10px rgba(255, 106, 0, 0.1);
            cursor: pointer;
        }

        .btn:hover {
            background: rgba(255, 106, 0, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 25px rgba(255, 106, 0, 0.6);
            transform: translateY(-3px);
            color: #fff;
        }

        .btn:active {
            transform: translateY(2px);
        }

        .btn span {
            font-size: 1.6rem;
        }

        .footer {
            margin-top: 50px;
            color: #555;
            font-size: 0.9rem;
        }

        /* ===== ОВЕРЛЕЙ (МОДАЛЬНОЕ ОКНО) ===== */
        .overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0, 0, 0, 0.75);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .overlay.active {
            opacity: 1;
            pointer-events: all;
        }

        .overlay-content {
            background: var(--glass);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-radius: 24px;
            border: 1px solid rgba(255, 106, 0, 0.3);
            padding: 40px 30px 35px;
            max-width: 420px;
            width: 100%;
            box-shadow: 0 0 50px rgba(255, 106, 0, 0.15);
            transform: scale(0.9) translateY(20px);
            transition: transform 0.4s cubic-bezier(0.34, 1.56, 0.64, 1), opacity 0.4s ease;
            opacity: 0;
            position: relative;
        }

        .overlay.active .overlay-content {
            transform: scale(1) translateY(0);
            opacity: 1;
        }

        .overlay-close {
            position: absolute;
            top: 12px;
            right: 18px;
            background: none;
            border: none;
            color: #aaa;
            font-size: 2rem;
            cursor: pointer;
            transition: color 0.2s ease, transform 0.2s ease;
            line-height: 1;
        }

        .overlay-close:hover {
            color: #fff;
            transform: rotate(90deg);
        }

        .overlay-content h2 {
            font-size: 2rem;
            margin-bottom: 8px;
            background: linear-gradient(90deg, #ffaa00, #ff6a00);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .overlay-content .subtitle-files {
            color: #aaa;
            margin-bottom: 30px;
            font-size: 1rem;
        }

        .file-grid {
            display: flex;
            flex-direction: column;
            gap: 15px;
            max-width: 300px;
            margin: 0 auto 30px;
        }

        .file-btn {
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 106, 0, 0.3);
            color: #fff;
            padding: 14px 20px;
            border-radius: 10px;
            font-size: 1.1rem;
            font-weight: 500;
            text-decoration: none;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 12px;
            cursor: pointer;
            width: 100%;
            background: rgba(255, 106, 0, 0.05);
        }

        .file-btn:hover {
            background: rgba(255, 106, 0, 0.15);
            border-color: var(--accent);
            box-shadow: 0 0 20px rgba(255, 106, 0, 0.3);
            transform: scale(1.02);
        }

        .file-btn span {
            font-size: 1.4rem;
        }

        .back-btn .btn {
            padding: 12px 25px;
            font-size: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-color: rgba(255, 255, 255, 0.1);
        }

        .back-btn .btn:hover {
            background: rgba(255, 106, 0, 0.1);
        }
    </style>
</head>
<body>
    <div class="container" id="mainContainer">
        <!-- Логотип -->
        <div class="logo">BLAZING<br>BLOCKS</div>
        <p class="subtitle">Инди-студия одного разработчика. Огонь в каждом пикселе.</p>

        <!-- Кнопки-переходники -->
        <div class="links" id="mainLinks">
            <a href="https://t.me/BlazingBlocksStudio" target="_blank" class="btn">
                <span>📢</span> Telegram канал
            </a>
            <a href="https://www.twitch.tv/blaze_ea" target="_blank" class="btn">
                <span>🎮</span> Twitch
            </a>
            <a href="https://blazing-blocks-studio.itch.io/" target="_blank" class="btn">
                <span>🎯</span> Itch.io
            </a>
            <a href="www.tiktok.com/@blazing.blocks.studio" target="_blank" class="btn">
                <span>🎵</span> TikTok
            </a>
            <a href="https://www.roblox.com/share/g/725905566" target="_blank" class="btn">
                <span>👥</span> Roblox комьюнити
            </a>
            <a href="https://www.donationalerts.com/r/blaze_ea" target="_blank" class="btn">
                <span>💛</span> DonationAlerts
            </a>
            <!-- Кнопка "Файлы" — открывает оверлей -->
            <button class="btn" id="openFilesBtn">
                <span>📁</span> Файлы
            </button>
        </div>

        <!-- Копирайт -->
        <div class="footer">
            © 2026 Blazing Blocks Studio. Все права защищены.
        </div>
    </div>

    <!-- ===== ОВЕРЛЕЙ С ФАЙЛАМИ ===== -->
    <div class="overlay" id="filesOverlay">
        <div class="overlay-content">
            <!-- Кнопка закрытия (крестик) -->
            <button class="overlay-close" id="closeOverlayBtn">✕</button>

            <h2>📂 Доступные файлы</h2>
            <p class="subtitle-files">Нажмите на кнопку, чтобы скачать Майнкрафт пак</p>

            <div class="file-grid">
                <button class="file-btn" onclick="alert('⚠️ Файл пока что недоступен. Следите за обновлениями в нашем Telegram-канале!')">
                    <span>⛏️</span> Скачать Майнкрафт пак
                </button>
            </div>

            <!-- Кнопка "Наверх" (она же закрывает оверлей) -->
            <div class="back-btn">
                <button class="btn" id="closeOverlayBtn2">
                    <span>⬆</span> Наверх
                </button>
            </div>
        </div>
    </div>

    <script>
        const overlay = document.getElementById('filesOverlay');
        const openBtn = document.getElementById('openFilesBtn');
        const closeBtns = document.querySelectorAll('#closeOverlayBtn, #closeOverlayBtn2');
        const container = document.getElementById('mainContainer');

        function openOverlay() {
            overlay.classList.add('active');
            container.classList.add('blurred');
        }

        function closeOverlay() {
            overlay.classList.remove('active');
            container.classList.remove('blurred');
        }

        openBtn.addEventListener('click', openOverlay);

        closeBtns.forEach(btn => {
            btn.addEventListener('click', closeOverlay);
        });

        // Закрытие по клику на фон (на сам оверлей, но не на его содержимое)
        overlay.addEventListener('click', function(e) {
            if (e.target === overlay) {
                closeOverlay();
            }
        });

        // Закрытие по клавише ESC
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && overlay.classList.contains('active')) {
                closeOverlay();
            }
        });
    </script>
</body>
</html>
